<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOMBANANA! Character Wheel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zcool+KuaiLe&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            min-height: 100vh;
            min-height: 100dvh;
        }

        body {
            background: linear-gradient(135deg, #2d1b4e 0%, #1a0f2e 50%, #0d0618 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Zcool KuaiLe', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 16px;
        }

        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,200,0,0.05) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .lang-switch {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 100;
            display: flex;
            gap: 6px;
        }

        .lang-switch button {
            padding: 5px 14px;
            font-family: 'Zcool KuaiLe', 'Microsoft YaHei', sans-serif;
            font-size: 0.85rem;
            border: 2px solid #ffd700;
            background: transparent;
            color: #ffd700;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lang-switch button.active {
            background: #ffd700;
            color: #2d1b4e;
            font-weight: bold;
        }

        .lang-switch button:hover {
            background: rgba(255, 215, 0, 0.2);
        }

        .title {
            font-size: clamp(1.6rem, 7vw, 3rem);
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 0 4px 8px rgba(0,0,0,0.8);
            margin-bottom: 6px;
            margin-top: 40px;
            z-index: 10;
            letter-spacing: clamp(2px, 1vw, 4px);
            animation: pulse 2s ease-in-out infinite;
            text-align: center;
            line-height: 1.2;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .subtitle {
            font-size: clamp(0.85rem, 3.5vw, 1.2rem);
            color: #ff8c00;
            margin-bottom: clamp(40px, 11vw, 60px);
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            text-align: center;
            padding: 0 10px;
            line-height: 1.4;
        }

        .wheel-container {
            position: relative;
            width: min(82vmin, 400px);
            height: min(82vmin, 400px);
            z-index: 10;
            margin-top: clamp(14px, 4.5vw, 24px);
            flex-shrink: 0;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3), 0 0 100px rgba(255, 140, 0, 0.1);
            border: clamp(4px, 1.2vmin, 8px) solid #ffd700;
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: clamp(44px, 11vmin, 80px);
            height: clamp(44px, 11vmin, 80px);
            background: radial-gradient(circle, #ffd700 0%, #ff8c00 100%);
            border-radius: 50%;
            z-index: 20;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.2rem, 4vmin, 2rem);
        }

        .wheel-center::after {
            content: '🍌';
        }

        /* 指针 */
        .pointer {
            position: absolute;
            top: clamp(-24px, -6vmin, -36px);
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: clamp(10px, 2.5vmin, 18px) solid transparent;
            border-right: clamp(10px, 2.5vmin, 18px) solid transparent;
            border-top: clamp(18px, 4.5vmin, 28px) solid #ff4444;
            z-index: 30;
            filter: drop-shadow(0 3px 4px rgba(0,0,0,0.5));
        }

        .pointer::after {
            content: '';
            position: absolute;
            top: clamp(-20px, -5vmin, -30px);
            left: 50%;
            transform: translateX(-50%);
            width: clamp(10px, 2.5vmin, 14px);
            height: clamp(10px, 2.5vmin, 14px);
            background: #ff4444;
            border-radius: 50%;
        }

        .spin-btn {
            margin-top: clamp(20px, 5vw, 40px);
            padding: clamp(10px, 3vw, 16px) clamp(28px, 10vw, 60px);
            font-size: clamp(1.1rem, 4vw, 1.8rem);
            font-family: 'Zcool KuaiLe', 'Microsoft YaHei', sans-serif;
            color: #fff;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4), 0 0 30px rgba(255, 215, 0, 0.2);
            transition: all 0.3s ease;
            z-index: 10;
            letter-spacing: clamp(2px, 1vw, 4px);
            white-space: nowrap;
            touch-action: manipulation;
        }

        .spin-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.6), 0 0 40px rgba(255, 215, 0, 0.3);
        }

        .spin-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .spin-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: clamp(16px, 4vw, 30px);
            font-size: clamp(1.1rem, 3.5vw, 2rem);
            color: #ffd700;
            text-align: center;
            z-index: 10;
            min-height: clamp(60px, 15vw, 80px);
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            opacity: 0;
            transition: opacity 0.5s ease;
            padding: 0 10px;
        }

        .result.show {
            opacity: 1;
        }

        .result .role-name {
            font-size: clamp(1.4rem, 5vw, 2.5rem);
            color: #ff6b35;
            display: block;
            margin-top: 8px;
            text-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
        }

        .role-info {
            margin-top: 8px;
            font-size: clamp(0.75rem, 2.5vw, 1rem);
            color: #ccc;
            max-width: min(90vw, 500px);
            line-height: 1.6;
            padding: 0 10px;
        }

        /* 猴子图标装饰 */
        .monkey-decoration {
            position: fixed;
            font-size: clamp(1.5rem, 5vw, 3rem);
            opacity: 0.12;
            z-index: 1;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
        }

        .monkey-1 { top: 8%; left: 5%; animation-delay: 0s; }
        .monkey-2 { top: 15%; right: 5%; animation-delay: 2s; }
        .monkey-3 { bottom: 12%; left: 8%; animation-delay: 4s; }
        .monkey-4 { bottom: 18%; right: 8%; animation-delay: 1s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(8deg); }
        }

        /* 粒子效果 */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ffd700;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }

        @keyframes particle-burst {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        /* 角色卡片预览 */
        .roles-preview {
            display: flex;
            gap: clamp(8px, 2.5vw, 20px);
            margin-top: clamp(12px, 3vw, 20px);
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
            padding-bottom: 20px;
        }

        .role-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 12px;
            padding: clamp(10px, 3vw, 15px);
            text-align: center;
            width: clamp(85px, 22vw, 120px);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .role-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 215, 0, 0.5);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.1);
        }

        .role-icon {
            font-size: clamp(1.8rem, 6vw, 3rem);
            margin-bottom: 6px;
        }

        .role-card-title {
            color: #ffd700;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
        }

        .role-card-desc {
            color: #aaa;
            font-size: clamp(0.65rem, 2vw, 0.75rem);
            margin-top: 3px;
            line-height: 1.3;
        }

        /* 签名 */
        .signature {
            position: fixed;
            bottom: 12px;
            left: 12px;
            z-index: 100;
            font-size: clamp(0.65rem, 2vw, 0.8rem);
            color: #ffd700;
            opacity: 0.7;
            font-family: 'Zcool KuaiLe', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            pointer-events: none;
            letter-spacing: 1px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div class="monkey-decoration monkey-1">🐵</div>
    <div class="monkey-decoration monkey-2">🙈</div>
    <div class="monkey-decoration monkey-3">🙉</div>
    <div class="monkey-decoration monkey-4">🙊</div>

    <div class="lang-switch">
        <button id="btnZh" class="active" onclick="switchLang('zh')">CN</button>
        <button id="btnEn" onclick="switchLang('en')">EN</button>
    </div>

    <h1 class="title">🍌 BOMBANANA! 🍌</h1>
    <p class="subtitle" id="subtitle">三只猴子，一颗炸弹，合作求生！</p>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel" class="wheel" width="400" height="400"></canvas>
        <div class="wheel-center"></div>
    </div>

    <button class="spin-btn" id="spinBtn" onclick="spin()">开始抽奖</button>

    <div class="result" id="result"></div>

    <div class="roles-preview">
        <div class="role-card">
            <div class="role-icon">🙈</div>
            <div class="role-card-title" id="cardTitle0">瞎子</div>
            <div class="role-card-desc" id="cardDesc0">看不见但会说话</div>
        </div>
        <div class="role-card">
            <div class="role-icon">🙉</div>
            <div class="role-card-title" id="cardTitle1">聋子</div>
            <div class="role-card-desc" id="cardDesc1">听不见但看得见</div>
        </div>
        <div class="role-card">
            <div class="role-icon">🙊</div>
            <div class="role-card-title" id="cardTitle2">哑巴</div>
            <div class="role-card-desc" id="cardDesc2">说不出但听得见</div>
        </div>
    </div>

    <div class="signature">
        <div>MADE BY CYYLin_805</div>
        <div>2026/7/2  v1.1</div>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultDiv = document.getElementById('result');

        const i18n = {
            zh: {
                subtitle: '三只猴子，一颗炸弹，合作求生！',
                spin: '开始抽奖',
                spinning: '转盘转动中...',
                spinAgain: '再抽一次',
                resultPrefix: '你抽到了角色：',
                roles: [
                    { name: '瞎子', desc: '你看不见炸弹，但你可以说话！依靠队友的指引来拆弹吧！', cardTitle: '瞎子', cardDesc: '看不见但会说话' },
                    { name: '聋子', desc: '你听不见声音，但你能看见！观察炸弹并把信息传达给队友！', cardTitle: '聋子', cardDesc: '听不见但看得见' },
                    { name: '哑巴', desc: '你说不出话，但你能听见！仔细聆听并用手势帮助队友！', cardTitle: '哑巴', cardDesc: '说不出但听得见' }
                ]
            },
            en: {
                subtitle: 'Three monkeys, one bomb, teamwork for survival!',
                spin: 'Spin',
                spinning: 'Spinning...',
                spinAgain: 'Spin Again',
                resultPrefix: 'You got:',
                roles: [
                    { name: 'The Blind', desc: "You cannot see the bomb, but you can speak! Rely on your teammates' guidance to defuse it!", cardTitle: 'Blind', cardDesc: 'Cannot see but can speak' },
                    { name: 'The Deaf', desc: 'You cannot hear sounds, but you can see! Observe the bomb and relay information to your teammates!', cardTitle: 'Deaf', cardDesc: 'Cannot hear but can see' },
                    { name: 'The Mute', desc: 'You cannot speak, but you can hear! Listen carefully and help your teammates with gestures!', cardTitle: 'Mute', cardDesc: 'Cannot speak but can hear' }
                ]
            }
        };

        let currentLang = 'zh';
        let currentRotation = 0;
        let isSpinning = false;
        let lastSelectedRoleIndex = -1;

        const roles = [
            { emoji: '🙈', color: '#6b2c91', colorLight: '#9b4fd1', angle: 0 },
            { emoji: '🙉', color: '#2c5f91', colorLight: '#4f8fd1', angle: 120 },
            { emoji: '🙊', color: '#2c9144', colorLight: '#4fd16b', angle: 240 }
        ];

        function switchLang(lang) {
            currentLang = lang;
            document.getElementById('btnZh').classList.toggle('active', lang === 'zh');
            document.getElementById('btnEn').classList.toggle('active', lang === 'en');

            const t = i18n[lang];
            document.getElementById('subtitle').textContent = t.subtitle;
            if (!isSpinning) {
                spinBtn.textContent = lastSelectedRoleIndex >= 0 ? t.spinAgain : t.spin;
            }
            for (let i = 0; i < 3; i++) {
                document.getElementById('cardTitle' + i).textContent = t.roles[i].cardTitle;
                document.getElementById('cardDesc' + i).textContent = t.roles[i].cardDesc;
            }
            drawWheel();
            if (lastSelectedRoleIndex >= 0) {
                showResult(lastSelectedRoleIndex);
            }
        }

        function drawWheel() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2 - 8;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            roles.forEach((role, index) => {
                const startAngle = (role.angle * Math.PI) / 180;
                const endAngle = ((role.angle + 120) * Math.PI) / 180;

                const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
                gradient.addColorStop(0, role.colorLight);
                gradient.addColorStop(1, role.color);

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 3;
                ctx.stroke();

                const textAngle = startAngle + (endAngle - startAngle) / 2;
                const textRadius = radius * 0.55;
                const textX = centerX + Math.cos(textAngle) * textRadius;
                const textY = centerY + Math.sin(textAngle) * textRadius;

                ctx.save();
                ctx.translate(textX, textY);
                ctx.rotate(textAngle + Math.PI / 2);

                ctx.font = '60px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(role.emoji, 0, -25);

                const roleName = i18n[currentLang].roles[index].name;
                ctx.font = 'bold 24px "Zcool KuaiLe", "Microsoft YaHei", sans-serif';
                ctx.fillStyle = '#fff';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 4;
                ctx.fillText(roleName, 0, 25);

                ctx.restore();
            });

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        function spin() {
            if (isSpinning) return;

            isSpinning = true;
            spinBtn.disabled = true;
            resultDiv.classList.remove('show');
            const t = i18n[currentLang];
            spinBtn.textContent = t.spinning;

            const minSpins = 3;
            const randomAngle = Math.random() * 360;
            const totalRotation = minSpins * 360 + randomAngle;
            currentRotation += totalRotation;

            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const pointerTargetAngle = (270 - (currentRotation % 360) + 360) % 360;
                let selectedIndex;

                if (pointerTargetAngle >= 0 && pointerTargetAngle < 120) {
                    selectedIndex = 0;
                } else if (pointerTargetAngle >= 120 && pointerTargetAngle < 240) {
                    selectedIndex = 1;
                } else {
                    selectedIndex = 2;
                }

                lastSelectedRoleIndex = selectedIndex;
                showResult(selectedIndex);
                createParticles();

                isSpinning = false;
                spinBtn.disabled = false;
                spinBtn.textContent = t.spinAgain;
            }, 4000);
        }

        function showResult(index) {
            const t = i18n[currentLang];
            const role = roles[index];
            const roleData = t.roles[index];
            resultDiv.innerHTML = `
                <div>${t.resultPrefix}</div>
                <span class="role-name">${role.emoji} ${roleData.name} ${role.emoji}</span>
                <div class="role-info">${roleData.desc}</div>
            `;
            resultDiv.classList.add('show');
        }

        function createParticles() {
            const colors = ['#ffd700', '#ff6b35', '#ff4444', '#4fd16b', '#4f8fd1'];
            const container = document.body;
            const rect = spinBtn.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = centerX + 'px';
                particle.style.top = centerY + 'px';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.width = (4 + Math.random() * 6) + 'px';
                particle.style.height = particle.style.width;

                const angle = (Math.PI * 2 * i) / 50;
                const distance = 100 + Math.random() * 200;
                particle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                particle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                particle.style.animation = `particle-burst 1s ease-out forwards`;

                container.appendChild(particle);

                setTimeout(() => particle.remove(), 1000);
            }
        }

        drawWheel();
    </script>
</body>
</html>
